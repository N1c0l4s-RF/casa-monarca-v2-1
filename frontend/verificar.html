<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casa Monarca — Verificación Pública</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      /* Paleta Casa Monarca */
      --orange:  #fd580b;
      --orange-d:#e44b04;
      --amber:   #fbb122;
      --success: #54b551;
      --red:     #d92626;

      --bg:      #faf6ef;
      --surface: #ffffff;
      --card:    #ffffff;
      --card-2:  #fbf6ee;
      --border:  #e5ddd2;
      --text:    #32251c;
      --muted:   #6d635a;

      /* Alias para reutilizar el código existente */
      --green:   var(--orange);
      --green-d: var(--orange-d);

      --ff-head: 'Montserrat', sans-serif;
      --ff-body: 'Open Sans', sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ff-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 48px;
    }
    .brand-icon {
      width: 40px; height: 40px;
      background: var(--green);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { width: 22px; height: 22px; color: white; }
    .brand-name { font-family: var(--ff-head); font-size: 1rem; font-weight: 600; letter-spacing: 0.05em; }
    .brand-name span { color: var(--green); }

    /* Main card */
    .verify-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 640px;
    }
    .card-title {
      font-family: var(--ff-head);
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .card-subtitle { color: var(--muted); font-size: 0.88rem; margin-bottom: 32px; }

    /* Search row */
    .search-row { display: flex; gap: 10px; }
    .search-row input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-family: var(--ff-head);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-row input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(253,88,11,0.18); }
    .search-row input::placeholder { color: #475569; font-family: var(--ff-body); }
    .btn-verify {
      background: var(--green);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 13px 22px;
      font-family: var(--ff-body);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-verify:hover { background: var(--green-d); }
    .btn-verify:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Result area */
    #result { margin-top: 28px; }

    /* Valid state (verde de éxito, no naranja brand) */
    .result-valid {
      background: rgba(84,181,81,0.07);
      border: 1px solid rgba(84,181,81,0.35);
      border-radius: 12px;
      padding: 24px;
    }
    .result-valid .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(84,181,81,0.16);
      border: 1px solid rgba(84,181,81,0.45);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.82rem;
      font-weight: 700;
      color: #2e6b2c;
      margin-bottom: 20px;
      font-family: var(--ff-head);
      letter-spacing: 0.06em;
    }

    /* Invalid state */
    .result-invalid {
      background: rgba(217,38,38,0.07);
      border: 1px solid rgba(217,38,38,0.30);
      border-radius: 12px;
      padding: 24px;
    }
    .result-invalid .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(217,38,38,0.14);
      border: 1px solid rgba(217,38,38,0.40);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.82rem;
      font-weight: 700;
      color: #9c1c1c;
      margin-bottom: 16px;
      font-family: var(--ff-head);
      letter-spacing: 0.06em;
    }
    .result-invalid p { color: var(--muted); font-size: 0.9rem; }

    /* Doc details grid */
    .doc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 480px) { .doc-grid { grid-template-columns: 1fr; } }
    .doc-field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .doc-field .val {
      font-size: 0.92rem;
      color: var(--text);
      font-family: var(--ff-head);
      word-break: break-all;
    }
    .doc-field.full { grid-column: 1 / -1; }

    /* Signature section */
    .sig-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .sig-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .sig-hex {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-family: var(--ff-head);
      font-size: 0.75rem;
      color: var(--green);
      word-break: break-all;
      line-height: 1.5;
    }

    /* Loading */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Back link */
    .back-link {
      margin-top: 32px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .back-link a { color: var(--green); text-decoration: none; font-weight: 500; }
    .back-link a:hover { text-decoration: underline; }

    /* Notice */
    .notice {
      background: rgba(253,88,11,0.05);
      border: 1px solid rgba(253,88,11,0.18);
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 24px;
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .notice svg { flex-shrink: 0; color: var(--green); margin-top: 1px; }
  </style>
</head>
<body>

<div class="header">
  <div class="brand-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
  </div>
  <div class="brand-name">Casa <span>Monarca</span></div>
</div>

<div class="verify-card">
  <h1 class="card-title">Verificación de documentos</h1>
  <p class="card-subtitle">Consulta pública — no requiere cuenta ni autenticación</p>

  <div class="search-row">
    <input type="text" id="folio-input" placeholder="DOC-20260428-XXXXXX" autocomplete="off" spellcheck="false">
    <button class="btn-verify" id="verify-btn" onclick="verificar()">Verificar</button>
  </div>

  <div id="result"></div>

  <div class="notice">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
    <span>Las firmas digitales de esta plataforma utilizan <strong>ECDSA P-256</strong>. La verificación criptográfica se realiza en el servidor contra la clave pública registrada del emisor.</span>
  </div>
</div>

<p class="back-link"><a href="index.html">← Acceso institucional</a></p>

<script type="module">
  async function apiFetch(path) {
    const base = (location.protocol === 'file:' || location.origin === 'null') ? 'http://localhost:8080' : location.origin;
    const res = await fetch(base + path, { credentials: 'include' });
    const data = res.headers.get('content-type')?.includes('application/json') ? await res.json() : null;
    if (!res.ok) throw new Error(data?.message || 'Error en la solicitud');
    return data;
  }

  function esc(s) {
    return String(s ?? '—').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function fmt(dt) {
    if (!dt) return '—';
    return new Date(dt).toLocaleString('es-MX', { dateStyle: 'medium', timeStyle: 'short' });
  }

  window.verificar = async () => {
    const folio = document.getElementById('folio-input').value.trim();
    const resultEl = document.getElementById('result');
    const btn = document.getElementById('verify-btn');
    if (!folio) return;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Verificando...';
    resultEl.innerHTML = '';

    try {
      const res = await apiFetch(`/api/documentos-verificar.php?folio=${encodeURIComponent(folio)}`);

      if (res.data?.valido) {
        const d = res.data.documento;
        resultEl.innerHTML = `
          <div class="result-valid">
            <div class="status-badge">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
              DOCUMENTO VÁLIDO
            </div>
            <div class="doc-grid">
              <div class="doc-field">
                <label>Folio</label>
                <div class="val">${esc(d.folio)}</div>
              </div>
              <div class="doc-field">
                <label>Estado</label>
                <div class="val">${esc(d.estado)}</div>
              </div>
              <div class="doc-field full">
                <label>Título</label>
                <div class="val">${esc(d.titulo)}</div>
              </div>
              <div class="doc-field">
                <label>Creado por</label>
                <div class="val">${esc(d.creador)}</div>
              </div>
              <div class="doc-field">
                <label>Firmado por</label>
                <div class="val">${esc(d.emisor)}</div>
              </div>
              <div class="doc-field">
                <label>Fecha de emisión</label>
                <div class="val">${fmt(d.fecha_emision)}</div>
              </div>
              <div class="doc-field">
                <label>Algoritmo</label>
                <div class="val">${esc(d.algoritmo)}</div>
              </div>
              ${d.tiene_pdf ? `
              <div class="doc-field full">
                <label>Documento original (PDF)</label>
                <div class="val" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
                  <a href="/api/documentos-archivo.php?folio=${encodeURIComponent(d.folio)}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;color:#2e6b2c;text-decoration:none;font-weight:500;padding:6px 12px;border:1px solid rgba(84,181,81,0.45);background:rgba(84,181,81,0.10);border-radius:8px">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    Ver PDF
                  </a>
                  <a href="/api/documentos-archivo.php?folio=${encodeURIComponent(d.folio)}&download=1" style="display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:0.85rem;padding:6px 12px;border:1px solid var(--border);background:var(--card-2);border-radius:8px">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Descargar
                  </a>
                </div>
              </div>
              ${d.hash_sha256 ? `
              <div class="doc-field full">
                <label>Hash SHA-256 del PDF (lo que firma cubre)</label>
                <div class="sig-hex">${esc(d.hash_sha256)}</div>
              </div>` : ''}
              ` : ''}
              ${d.firma ? `
              <div class="doc-field full sig-section">
                <div class="sig-label">Firma ECDSA P-256 (hex)</div>
                <div class="sig-hex">${esc(d.firma)}</div>
              </div>` : ''}
            </div>
          </div>`;
      } else {
        resultEl.innerHTML = `
          <div class="result-invalid">
            <div class="status-badge">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              NO ENCONTRADO
            </div>
            <p>${esc(res.data?.mensaje || res.message || 'El folio ingresado no corresponde a ningún documento emitido.')}</p>
          </div>`;
      }
    } catch (err) {
      resultEl.innerHTML = `
        <div class="result-invalid">
          <div class="status-badge">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            ERROR
          </div>
          <p>${esc(err.message) || 'No se pudo conectar con el servidor.'}</p>
        </div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Verificar';
    }
  };

  // Allow Enter key to trigger verification
  document.getElementById('folio-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.verificar();
  });

  // Pre-fill folio from URL param
  const params = new URLSearchParams(location.search);
  const folioPrefill = params.get('folio');
  if (folioPrefill) {
    document.getElementById('folio-input').value = folioPrefill;
    window.verificar();
  }
</script>
</body>
</html>
